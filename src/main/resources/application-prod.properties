# Production Database Configuration - PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://dpg-d2e4fsadbo4c73emk2cg-a.oregon-postgres.render.com:5432/blue_r0op}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:blue_r0op_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:qD6VX9gmwx7OMEqbIzfriJrY85dPuBvq}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration for Production
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Production Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:600000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:60000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT:10000}
spring.datasource.hikari.leak-detection-threshold=${DB_POOL_LEAK_DETECTION:120000}
spring.datasource.hikari.connection-test-query=SELECT 1

# SSL Configuration for Production Database
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.sslcert=
spring.datasource.hikari.data-source-properties.sslkey=
spring.datasource.hikari.data-source-properties.sslrootcert=

# Production Logging
logging.level.root=WARN
logging.level.org.springframework.web=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.com.techtack=INFO

# Actuator for Production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.defaults.enabled=true
management.health.diskspace.enabled=true
management.health.db.enabled=true

# JavaMail SMTP Configuration for Production
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Email sender configuration
mail.from.email=${MAIL_FROM_EMAIL:your-email@gmail.com}
mail.from.name=${MAIL_FROM_NAME:Blue Trading Platform}
